name: Deploy Frontend (VPS)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Web
        run: npm ci && npm run build
      - name: SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      - name: Guard remote deploy dir
        run: ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "bash -lc 'DIR="${{ secrets.FRONTEND_DEPLOY_DIR }}"; [ -n "$DIR" ] || (echo "ERROR: FRONTEND_DEPLOY_DIR empty"; exit 2); case "$DIR" in /|/opt|/opt/|/opt/apps|/opt/apps/|/opt/apps/myapp|/opt/apps/myapp/) echo "ERROR: deploy dir too broad: $DIR"; exit 3;; esac; mkdir -p "$DIR"; echo "OK: $DIR"'"
      - name: Rsync frontend to VPS (SAFE)
        run: rsync -az --delete -e "ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no" ./dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.FRONTEND_DEPLOY_DIR }}/
      - name: Reload nginx
        run: ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo systemctl reload nginx"
