name: Deploy Backend (VPS)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish API
        run: dotnet restore && dotnet publish ./src/Api/Api.csproj -c Release -o ./out/api
      - name: SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      - name: Guard remote deploy dir
        run: ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "bash -lc 'DIR="${{ secrets.BACKEND_DEPLOY_DIR }}"; [ -n "$DIR" ] || (echo "ERROR: BACKEND_DEPLOY_DIR empty"; exit 2); case "$DIR" in /|/opt|/opt/|/opt/apps|/opt/apps/|/opt/apps/myapp|/opt/apps/myapp/) echo "ERROR: deploy dir too broad: $DIR"; exit 3;; esac; mkdir -p "$DIR"; echo "OK: $DIR"'"
      - name: Rsync backend to VPS (SAFE)
        run: rsync -az --delete -e "ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no" ./out/api/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.BACKEND_DEPLOY_DIR }}/
      - name: Restart backend service
        run: ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo systemctl restart myapp-api && sudo systemctl reload nginx"
